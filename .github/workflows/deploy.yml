name: Deploy PKWL Property

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build & Test
        working-directory: ./backend
        run: |
          go mod download
          go build -o server ./cmd/server

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        working-directory: ./backend
        run: docker build -t ${{ env.BACKEND_IMAGE }}:latest .

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        working-directory: ./frontend
        run: docker build -t ${{ env.FRONTEND_IMAGE }}:latest .

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy notification
        run: echo "Ready to deploy to VPS DomaineSIA. Configure SSH deployment in this step."
