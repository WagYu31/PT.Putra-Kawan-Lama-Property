version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pkwl-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pkwl_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pkwl_secret_2024}
      POSTGRES_DB: ${DB_NAME:-pkwl_property}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-pkwl_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pkwl-backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pkwl_user}
      DB_PASSWORD: ${DB_PASSWORD:-pkwl_secret_2024}
      DB_NAME: ${DB_NAME:-pkwl_property}
      JWT_SECRET: ${JWT_SECRET:-pkwl-jwt-super-secret-key-2024}
      PORT: 8080
      GIN_MODE: ${GIN_MODE:-debug}
      UPLOAD_DIR: /app/uploads
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-Mid-server-KAbrho23wovIVChp-hGjUvIb}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-Mid-client-mGA7v04cXrux3KNF}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
    ports:
      - "8081:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
    container_name: pkwl-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-Mid-client-mGA7v04cXrux3KNF}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
